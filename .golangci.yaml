# Our default golangci-lint configuration
# If these linters fail, then it should fail the build.
version: "2"
run:
  timeout: 5m
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    staticcheck:
      checks:
        - "all"
        - "-QF*"  # Exclude quickfix suggestions
        - "-ST*"  # Exclude all style checks (ST1000, ST1006, ST1019, ST1020, ST1021)
